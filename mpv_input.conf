# VSlicer mpv input configuration
# This disables mpv's default keybindings for keys we want to use

# Disable default keybindings that conflict with VSlicer
i ignore  # Default: show filename
o ignore  # Default: show progress
e ignore  # Default: move to next frame (we use . for this)
h ignore  # Default: cycle deinterlace
q ignore  # Default: quit (we want to handle this ourselves)

# Keep useful defaults
SPACE cycle pause
. frame-step
, frame-back-step

# Disable other potentially confusing shortcuts
s ignore  # screenshot
S ignore  # screenshot without subtitles
ESC ignore  # close window
